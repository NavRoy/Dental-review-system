<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Share Your Experience</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --blue:    #1a73e8;
      --blue-dk: #1557b0;
      --blue-lt: #e8f0fe;
      --green:   #1e8c45;
      --orange:  #e65100;
      --bg:      #f1f5fb;
      --white:   #ffffff;
      --border:  #e4e9f2;
      --text:    #1a1f2e;
      --muted:   #7a8499;
      --shadow:  0 2px 12px rgba(26,115,232,0.07), 0 1px 3px rgba(0,0,0,0.05);
    }

    html { scroll-behavior: smooth; }
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      color: var(--text);
    }

    /* ── HEADER ── */
    header {
      width: 100%;
      background: var(--white);
      border-bottom: 1px solid var(--border);
      padding: 14px 20px 12px;
      text-align: center;
      position: sticky; top: 0; z-index: 10;
      box-shadow: 0 1px 8px rgba(0,0,0,0.06);
    }
    .header-inner { max-width: 700px; margin: 0 auto; }
    header h1 { font-size: 1rem; font-weight: 700; color: var(--blue); }
    header p  { font-size: 0.76rem; color: var(--muted); margin-top: 2px; }

    main { width: 100%; max-width: 700px; padding: 16px 16px 0; flex: 1; }

    /* ── CATEGORY PILLS ── */
    #categories-header {
      display: flex; overflow-x: auto;
      gap: 8px; padding: 4px 0 14px;
      scrollbar-width: none; -webkit-overflow-scrolling: touch;
    }
    #categories-header::-webkit-scrollbar { display: none; }

    .cat-btn {
      flex: 0 0 auto; padding: 7px 14px;
      border-radius: 20px; border: 1.5px solid var(--border);
      cursor: pointer; font-size: 0.82rem; font-weight: 600;
      white-space: nowrap; background: var(--white); color: var(--muted);
      transition: all 0.2s ease; font-family: inherit;
    }
    .cat-btn:hover { border-color: var(--blue); color: var(--blue); }
    .cat-btn.active {
      background: var(--blue); color: var(--white); border-color: var(--blue);
      box-shadow: 0 2px 10px rgba(26,115,232,0.28);
    }
    .cat-count {
      display: inline-block; border-radius: 10px;
      font-size: 0.72rem; font-weight: 700;
      padding: 1px 6px; margin-left: 4px;
      background: var(--blue-lt); color: var(--blue);
    }
    .cat-btn.active .cat-count { background: rgba(255,255,255,0.25); color: #fff; }

    /* ── REVIEWS ── */
    #reviews-container {
      display: flex; flex-direction: column;
      gap: 12px; padding-bottom: 24px;
    }

    /* ── CARD ── */
    .review-card {
      background: var(--white);
      padding: 18px 18px 14px;
      border-radius: 14px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      animation: slideIn 0.2s ease both;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .review-card.removing {
      animation: slideOut 0.16s ease both;
      overflow: hidden; pointer-events: none;
    }
    @keyframes slideOut {
      from { opacity: 1; max-height: 300px; margin-bottom: 12px; }
      to   { opacity: 0; max-height: 0; margin-bottom: 0; padding-top: 0; padding-bottom: 0; }
    }

    .review-num {
      font-size: 0.7rem; font-weight: 700;
      color: var(--blue); background: var(--blue-lt);
      display: inline-block; padding: 2px 8px;
      border-radius: 10px; margin-bottom: 10px;
    }
    .review-text {
      line-height: 1.65; font-size: 0.93rem;
      color: #2c3444; margin-bottom: 14px;
    }
    .copy-btn {
      background: var(--blue); color: var(--white);
      padding: 11px 16px; border: none; border-radius: 10px;
      cursor: pointer; font-size: 0.88rem; width: 100%;
      font-weight: 600; font-family: inherit;
      transition: background 0.15s, transform 0.1s;
      display: flex; align-items: center; justify-content: center; gap: 7px;
    }
    .copy-btn:hover:not(:disabled) { background: var(--blue-dk); transform: scale(1.01); }
    .copy-btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .copy-btn.done  { background: var(--green);  pointer-events: none; }
    .copy-btn.taken { background: var(--orange); pointer-events: none; font-size: 0.82rem; }

    /* ── SKELETON ── */
    .skeleton-card {
      background: var(--white); border-radius: 14px;
      padding: 18px; border: 1px solid var(--border); box-shadow: var(--shadow);
    }
    .skeleton-line {
      height: 13px; border-radius: 6px; margin-bottom: 9px;
      background: linear-gradient(90deg, #eef2f7 25%, #dde4ef 50%, #eef2f7 75%);
      background-size: 200% 100%; animation: shimmer 1.4s infinite;
    }
    .skeleton-line.s { width: 55%; }
    .skeleton-line.btn { height: 40px; margin-top: 14px; border-radius: 10px; }
    @keyframes shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* ── EMPTY ── */
    .empty-state { text-align: center; padding: 56px 20px; color: var(--muted); }
    .empty-state .icon { font-size: 2.8rem; margin-bottom: 14px; }
    .empty-state h2 { font-size: 1.05rem; font-weight: 700; color: var(--text); margin-bottom: 6px; }
    .empty-state p { font-size: 0.85rem; line-height: 1.6; }

    footer { width: 100%; text-align: center; padding: 16px; font-size: 0.78rem; color: #b0b8c8; }

    @media (max-width: 480px) {
      main { padding: 12px 12px 0; }
      .review-card { padding: 14px 14px 12px; }
      .review-text { font-size: 0.88rem; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <h1>📋 Review Templates</h1>
    <p>Pick a review · Copy it · Paste on Google</p>
  </div>
</header>

<main>
  <div id="categories-header"></div>
  <div id="reviews-container"></div>
</main>

<footer>
Thank you for sharing your dental experience 🦷
</footer>

<script>
// ═══════════════════════════════════════════════════════
//  CONFIG — only change these two lines
// ═══════════════════════════════════════════════════════
const API_BASE      = 'https://review-system-6j0r.onrender.com'; // ← your backend URL
const POLL_MS       = 1500;  // sync with other devices every 1.5s

// ═══════════════════════════════════════════════════════
//  DEVICE ID — unique per browser tab
//  Prevents same device claiming same review twice
// ═══════════════════════════════════════════════════════
const DEVICE_ID = (() => {
  let id = localStorage.getItem('rdid');
  if (!id) { id = 'D' + Math.random().toString(36).slice(2,10) + Date.now().toString(36); localStorage.setItem('rdid', id); }
  return id;
})();

// ═══════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════
let allData        = [];   // [{ categoryName, reviews:[{id,review,customer}] }]
let activeCategory = null;
let isFetching     = false;
let pollTimer      = null;
const usedByMe     = new Set(); // IDs used by THIS device (local guard)

// ═══════════════════════════════════════════════════════
//  DOM
// ═══════════════════════════════════════════════════════
const container = document.getElementById('reviews-container');
const headerEl  = document.getElementById('categories-header');
const slug = window.location.pathname.replace(/^\/r\/|^\//,'').split('?')[0] || 'day-and-night-dental-clinic';

// ═══════════════════════════════════════════════════════
//  FETCH — gets fresh data from server
//  silent=true → no skeleton flash, just update state
// ═══════════════════════════════════════════════════════
async function fetchReviews(silent = false) {
  if (isFetching) return false;
  isFetching = true;
  if (!silent) showSkeletons();

  try {
    const ctrl  = new AbortController();
    const timer = setTimeout(() => ctrl.abort(), 8000);
    const res   = await fetch(`${API_BASE}/review/${slug}`, { signal: ctrl.signal, cache: 'no-store' });
    clearTimeout(timer);
    const data  = await res.json();

    if (!data.success) {
      if (data.data?.reviewLink) { window.location.href = data.data.reviewLink; return false; }
      if (!silent) showEmpty('No reviews available right now.');
      return false;
    }

    const incoming = (data.data || [])
      .map(c => ({
        ...c,
        // Filter reviews this device already used (instant local consistency before server catches up)
        reviews: (c.reviews || []).filter(r => !usedByMe.has(r.id)).slice(0, 10)
      }))
      .filter(c => c.reviews.length > 0);

    if (!incoming.length) {
      if (!silent) showEmpty('All reviews used. Generating more automatically...');
      return false;
    }

    allData = incoming;

    // Keep active category if still has reviews; else switch to first
    if (!allData.find(c => c.categoryName === activeCategory)) {
      activeCategory = allData[0].categoryName;
    }

    return true; // data loaded successfully

  } catch (err) {
    if (err.name !== 'AbortError') console.error('fetch error:', err);
    return false;
  } finally {
    isFetching = false;
  }
}

// ═══════════════════════════════════════════════════════
//  RENDER CATEGORIES
// ═══════════════════════════════════════════════════════
function renderCategories() {
  const saved = headerEl.scrollLeft;
  headerEl.innerHTML = '';
  allData.forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'cat-btn' + (cat.categoryName === activeCategory ? ' active' : '');
    btn.dataset.cat = cat.categoryName;

    const nameEl  = document.createElement('span');
    nameEl.textContent = cat.categoryName;
    const countEl = document.createElement('span');
    countEl.className = 'cat-count';
    countEl.textContent = cat.reviews.length;

    btn.append(nameEl, countEl);
    btn.addEventListener('click', () => {
      activeCategory = cat.categoryName;
      renderCategories();
      renderReviews();
    });
    headerEl.appendChild(btn);
  });
  headerEl.scrollLeft = saved;
}

// ═══════════════════════════════════════════════════════
//  RENDER REVIEWS — always reads from allData (local state)
// ═══════════════════════════════════════════════════════
function renderReviews() {
  container.innerHTML = '';
  const cat = allData.find(c => c.categoryName === activeCategory);
  if (!cat) return;
  cat.reviews.forEach((r, i) => container.appendChild(buildCard(r, i + 1)));
}

// ═══════════════════════════════════════════════════════
//  BUILD CARD
// ═══════════════════════════════════════════════════════
function buildCard(review, num) {
  const card = document.createElement('div');
  card.className = 'review-card';
  card.dataset.id = review.id;

  const badge = document.createElement('div');
  badge.className = 'review-num';
  badge.textContent = `#${num}`;

  const txt = document.createElement('p');
  txt.className = 'review-text';
  txt.textContent = review.review; // textContent = XSS safe, never innerHTML

  const btn = document.createElement('button');
  btn.className = 'copy-btn';
  btn.innerHTML = '📋 Copy &amp; Post on Google';
  btn.addEventListener('click', () => onCopy(review, card, btn));

  card.append(badge, txt, btn);
  return card;
}

// ═══════════════════════════════════════════════════════
//  COPY HANDLER — the core flow
// ═══════════════════════════════════════════════════════
async function onCopy(review, card, btn) {
  if (btn.disabled) return;
  btn.disabled = true;

  // ── 1. CLAIM on server (atomic lock — prevents duplicate across devices) ──
  try {
    const claimRes  = await fetch(`${API_BASE}/review/${review.id}/claim`, {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ deviceId: DEVICE_ID })
    });
    const claimData = await claimRes.json();

    if (!claimData.success) {
      // Another device got there first — remove from our local state and show message
      btn.className   = 'copy-btn taken';
      btn.textContent = '⚠️ Already taken — pick another';
      usedByMe.add(review.id);
      removeLocal(review.id);
      setTimeout(() => {
        card.classList.add('removing');
        setTimeout(() => { card.remove(); renderCategories(); }, 180);
      }, 1200);
      return;
    }
  } catch {
    // Network hiccup on claim — continue anyway
    // Worst case: two people post same review (very rare, acceptable)
  }

  // ── 2. COPY text to clipboard ──
  try {
    await navigator.clipboard.writeText(review.review);
  } catch {
    // Fallback for HTTP / older browsers
    const ta = Object.assign(document.createElement('textarea'), {
      value: review.review, style: 'position:fixed;opacity:0;top:0;left:0'
    });
    document.body.append(ta);
    ta.select();
    document.execCommand('copy');
    ta.remove();
  }

  // ── 3. Feedback ──
  btn.className   = 'copy-btn done';
  btn.textContent = '✓ Copied! Opening Google...';

  // ── 4. Open Google (slight delay so clipboard finishes) ──
  setTimeout(() => window.open(review.customer.reviewLink, '_blank'), 150);

  // ── 5. Remove from local state immediately ──
  usedByMe.add(review.id);
  removeLocal(review.id);

  // ── 6. Animate card out ──
  card.classList.add('removing');

  setTimeout(async () => {
    card.remove();

    // ── 7. Fetch fresh data from server immediately ──
    //    This is what keeps the count at 10:
    //    server returns a new PENDING review to replace the one we just used
    const ok = await fetchReviews(true); // silent — no skeleton flash

    if (ok) {
      // Re-render with new data (may include replacement review from server)
      renderCategories();
      renderReviews();
    } else {
      // Fetch failed or no new reviews yet — re-render from local state
      const stillHere = allData.find(c => c.categoryName === activeCategory);
      if (stillHere && stillHere.reviews.length > 0) {
        renderCategories();
        renderReviews();
      } else {
        const next = allData.find(c => c.reviews.length > 0);
        if (next) {
          activeCategory = next.categoryName;
          renderCategories();
          renderReviews();
        } else {
          showEmpty('All reviews used! Generating more automatically...');
        }
      }
    }
  }, 180); // matches slideOut animation

  // ── 8. Mark USED in DB — fire and forget, never blocks UI ──
  fetch(`${API_BASE}/review/${review.id}`, { method: 'PUT', keepalive: true }).catch(() => {});
}

// ═══════════════════════════════════════════════════════
//  REMOVE FROM LOCAL STATE
// ═══════════════════════════════════════════════════════
function removeLocal(id) {
  allData = allData
    .map(cat => ({ ...cat, reviews: cat.reviews.filter(r => r.id !== id) }))
    .filter(cat => cat.reviews.length > 0);
}

// ═══════════════════════════════════════════════════════
//  SKELETON LOADER
// ═══════════════════════════════════════════════════════
function showSkeletons(n = 5) {
  container.innerHTML = Array.from({ length: n }, () => `
    <div class="skeleton-card">
      <div class="skeleton-line s"></div>
      <div class="skeleton-line"></div>
      <div class="skeleton-line"></div>
      <div class="skeleton-line" style="width:70%"></div>
      <div class="skeleton-line btn"></div>
    </div>`).join('');
}

// ═══════════════════════════════════════════════════════
//  EMPTY STATE
// ═══════════════════════════════════════════════════════
function showEmpty(msg) {
  headerEl.innerHTML = '';
  container.innerHTML = `
    <div class="empty-state">
      <div class="icon">📭</div>
      <h2>No Reviews Available</h2>
      <p>${msg}</p>
    </div>`;
}

// ═══════════════════════════════════════════════════════
//  POLLING — keeps devices in sync
//  Every 1.5s: silently refresh → if data changed → re-render
// ═══════════════════════════════════════════════════════
function startPolling() {
  clearInterval(pollTimer);
  pollTimer = setInterval(async () => {
    if (document.visibilityState !== 'visible') return;
    const prevStr = JSON.stringify(allData);
    const ok      = await fetchReviews(true);
    if (ok && JSON.stringify(allData) !== prevStr) {
      // Only re-render if data actually changed — avoids unnecessary DOM work
      renderCategories();
      renderReviews();
    }
  }, POLL_MS);
}

// Pause when tab hidden, resume (with immediate sync) when tab visible again
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible') {
    fetchReviews(true).then(ok => { if (ok) { renderCategories(); renderReviews(); } });
    startPolling();
  } else {
    clearInterval(pollTimer);
  }
});

// ═══════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════
(async () => {
  showSkeletons(6);
  const ok = await fetchReviews(false);
  if (ok) { renderCategories(); renderReviews(); }
  startPolling();
})();
</script>
</body>
</html>
